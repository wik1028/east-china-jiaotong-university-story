<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华东交通大学新生入学须知调查</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:sans-serif;
font-size:18px;
background:#fff;
color:#222;
min-height:100vh;
overflow-x:hidden;
transition:background .3s;
}
.container{
max-width:600px;
margin:0 auto;
padding:20px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}
.question-container{display:none;animation:fadeIn .3s}
.question-container.active{display:block}
.question-text{
font-size:clamp(1rem,3.5vw,1.2rem);
margin-bottom:20px;
line-height:1.6;
}
.options{
list-style:none;
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:20px;
}
.options li{
border:2px solid #ddd;
padding:clamp(12px,3vw,16px);
cursor:pointer;
transition:all .2s;
font-size:clamp(0.9rem,3vw,1rem);
position:relative;
}
.options li:hover{border-color:#999}
.options li.selected{
background:#ddd;
border-color:#999;
pointer-events:none;
}
.options li.locked{
pointer-events:none;
opacity:0.6;
}
.options li.disappear{
animation:disappear .5s forwards;
}
@keyframes disappear{
to{opacity:0;height:0;padding:0;margin:0;border:0}
}
.btn-nav{
display:flex;
gap:10px;
}
.btn-nav button{
flex:1;
padding:clamp(12px,3vw,16px);
border:2px solid #222;
background:#fff;
cursor:pointer;
font-size:clamp(0.9rem,3vw,1rem);
transition:all .2s;
}
.btn-nav button:hover{background:#222;color:#fff}
.btn-nav button:disabled{
opacity:0.3;
cursor:not-allowed;
}
.progress{
text-align:center;
font-size:clamp(0.8rem,2.5vw,0.9rem);
color:#666;
margin-bottom:15px;
height:20px;
position:relative;
}
.progress-bar{
position:absolute;
bottom:0;
left:0;
height:3px;
background:#222;
transition:width .3s;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
z-index:1000;
align-items:center;
justify-content:center;
padding:20px;
}
.modal-overlay.active{display:flex}
.modal{
background:#fff;
padding:clamp(25px,5vw,35px);
max-width:450px;
width:100%;
text-align:center;
}
.modal-title{font-size:clamp(1.1rem,3.5vw,1.3rem);margin-bottom:15px}
.modal-text{font-size:clamp(0.9rem,3vw,1rem);color:#666;line-height:1.7;margin-bottom:20px}
.modal-btn{
padding:12px 30px;
background:#222;
color:#fff;
border:none;
cursor:pointer;
font-size:clamp(0.9rem,3vw,1rem);
}
.modal-btn:hover{background:#444}
.warning-modal{
border:3px solid #c00;
animation:pulse 0.5s infinite alternate;
}
.warning-modal .modal-title{color:#c00}
@keyframes pulse{
from{transform:scale(1)}
to{transform:scale(1.02)}
}
.black-screen{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:2000;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
}
.black-screen.active{display:flex}
.terror-text{
color:#c00;
font-size:clamp(1.2rem,4vw,1.5rem);
text-align:center;
}
.peep-text{
position:fixed;
font-size:clamp(1rem,3vw,1.2rem);
color:#c00;
pointer-events:none;
z-index:800;
opacity:0.15;
font-weight:bold;
text-shadow:0 0 10px #c00;
animation:peepFade 6s forwards;
}
@keyframes peepFade{
0%{opacity:0}
10%{opacity:0.15}
90%{opacity:0.15}
100%{opacity:0}
}
.gray-overlay{
position:fixed;
inset:0;
background:rgba(90,90,90,0.3);
z-index:600;
display:none;
}
.gray-overlay.active{display:block}
body.red-bg{
background:#d80000 !important;
}
body.red-bg .container{opacity:0;transition:opacity .3s}
.micro-feedback{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
background:#c00;
color:#fff;
padding:4px 10px;
font-size:0.8rem;
white-space:nowrap;
animation:fadeOut 1.5s forwards;
z-index:100;
}
@keyframes fadeOut{
0%{opacity:1}
70%{opacity:1}
100%{opacity:0}
}
.diary-screen{
position:fixed;
inset:0;
background:#1a1a1a;
z-index:3000;
display:none;
padding:20px;
}
.diary-screen.active{display:block}
.diary-container{
max-width:500px;
margin:20px auto;
height:calc(100vh - 100px);
max-height:600px;
position:relative;
}
.diary-page{
position:absolute;
width:100%;
height:100%;
background:#f5f0e6;
padding:20px;
overflow-y:auto;
font-family:"STKaiti","KaiTi",serif;
line-height:1.8;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}
.diary-date{
text-align:right;
color:#666;
font-size:0.85rem;
margin-bottom:15px;
font-family:sans-serif;
}
.diary-content{
font-size:clamp(0.9rem,3vw,1rem);
white-space:pre-wrap;
word-break:break-all;
}
.diary-nav{
display:flex;
justify-content:space-between;
margin-top:15px;
}
.diary-nav button{
padding:10px 20px;
background:#222;
color:#fff;
border:none;
cursor:pointer;
}
.diary-nav button:disabled{background:#666;cursor:not-allowed}
.final-screen{
position:fixed;
inset:0;
background:#000;
z-index:4000;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}
.final-screen.active{display:flex}
.final-text{
color:#fff;
font-size:clamp(1.5rem,5vw,2rem);
margin:10px 0;
opacity:0;
animation:fadeInText 1s forwards;
}
.final-text.red{color:#c00;}
.final-text.green{color:#006633;}
.final-text.gold{color:#d4a017;}
@keyframes fadeInText{
to{opacity:1}
}
.confirm-btn{
margin-top:30px;
padding:15px 40px;
background:#c00;
color:#fff;
border:none;
cursor:pointer;
font-size:1.1rem;
display:none;
}
.confirm-btn.green{background:#006633;}
.confirm-btn.gold{background:#d4a017;}
.confirm-btn.show{display:block}
.flash{animation:flash .1s 3;}
@keyframes flash{
50%{background:#fff}
}
.sound-hint{
font-size:0.7rem;
color:#999;
text-align:center;
margin-top:10px;
}
.story-log{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:#c00;
padding:8px 16px;
font-size:0.85rem;
z-index:500;
display:none;
animation:storyFade 3s forwards;
}
@keyframes storyFade{
0%{opacity:0;transform:translateX(-50%) translateY(10px)}
15%{opacity:1;transform:translateX(-50%) translateY(0)}
85%{opacity:1;transform:translateX(-50%) translateY(0)}
100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
</style>
</head>
<body>
<div class="container" id="app">
<div class="progress" id="progressText">
第1题 / 共28题
<div class="progress-bar" id="progressBar" style="width:3.5%"></div>
</div>
<div id="questionContainer"></div>
<div class="btn-nav" id="btnNav">
<button id="prevBtn" disabled>上一题</button>
<button id="nextBtn" disabled>下一题</button>
</div>
</div>
<div class="modal-overlay active" id="startModal">
<div class="modal warning-modal">
<div class="modal-title">⚠️ 重要警告</div>
<div class="modal-text">
本问卷基于华东交通大学真实校史改编<br>
包含强烈的心理恐怖元素<br>
每一个选择都会永久改变剧情走向<br>
没有回头路<br><br>
<span style="color:#c00">深夜11:30之后请勿独自作答</span><br>
<span style="color:#666;font-size:0.8rem">你只有一次机会</span>
</div>
<button class="modal-btn" id="startBtn">我已知晓并继续</button>
<div class="sound-hint">戴上耳机，体验更佳</div>
</div>
</div>
<div class="black-screen" id="terrorScreen">
<div class="terror-text" id="terrorText"></div>
</div>
<div class="gray-overlay" id="grayOverlay"></div>
<div class="diary-screen" id="diaryScreen">
<div class="diary-container">
<div class="diary-page" id="diaryPage">
<div class="diary-content" id="diaryContent"></div>
</div>
</div>
<div class="diary-nav">
<button id="diaryPrev">← 上一页</button>
<button id="diaryNext">下一页 →</button>
<button id="diaryClose">关闭日记</button>
</div>
</div>
<div class="final-screen" id="finalScreen">
<div id="finalText"></div>
<button class="confirm-btn" id="confirmBtn">确认</button>
</div>
<div class="modal-overlay" id="endModal">
<div class="modal">
<div class="modal-title" id="endTitle"></div>
<div class="modal-text" id="endText"></div>
<button class="modal-btn" id="restartBtn">重新开始</button>
</div>
</div>
<div class="story-log" id="storyLog"></div>

<script>
const Game = {
    state: {
        currentQ: 0,
        answers: [],
        isLocked: false,
        diaryPage: 0,
        wrongAttempts: 0,
        currentEnding: "",
        foundOldPhoto: false,
        heardTheWhisper: false,
        wentToCave: false,
        helpedHer: false,
        courage: 0,
        memories: 0,
        readDiary: false,
        foundTheTruth: false,
        metHerBefore: false
    },

    questions: [
        {
            id:1,
            text:"九月的南昌，闷热潮湿。你拖着重重的行李箱，第一次踏进华东交通大学的南门。法桐大道的树叶在风中沙沙作响，一个满头白发的老保安从值班室里探出头来，递给你一本泛黄的新生手册。手册的最后一页被撕掉了半张，残留的字迹歪歪扭扭地写着：\"请务必在入学第一周内找到开山……\" —— 后面的字被大片墨水晕开，完全看不清了。你会——",
            options:[
                {text:"礼貌地问保安：\"爷爷，这后面写的是什么？\"",next:2,effect:()=>{Game.state.courage++;Game.showStoryLog("保安的眼神闪烁了一下，但他什么都没说")}},
                {text:"把手册仔细收好，先去宿舍安顿下来再说",next:2,effect:()=>{}},
                {text:"翻到手册前面，一页一页仔细阅读",next:2,effect:()=>{Game.state.foundOldPhoto=true;Game.state.memories++;Game.showStoryLog("手册里夹着一张黑白照片，照片上是一个穿白衬衫的女生")}},
                {text:"觉得这只是吓唬新生的恶作剧，随手扔进垃圾桶",next:2,effect:()=>{Game.state.wrongAttempts++;Game.showStoryLog("垃圾桶里传来一声很轻的叹息")}},
                {text:"拍张照片发到新生群里，问问大家这是什么意思",next:2,effect:()=>{Game.state.heardTheWhisper=true;Game.showStoryLog("群里没有一个人回复你")}}
            ]
        },
        {
            id:2,
            text:"你被分配到北区33栋宿舍楼。推开门的瞬间，一股陈旧的樟脑味扑面而来。你的室友们还没到，房间里只有你一个人。靠窗的桌子上放着一面用红布盖着的镜子。红布上绣着两个字：\"勿揭\"。窗外，天佑桥上的路灯在暮色中一盏一盏地亮起来。你会——",
            options:[
                {text:"好奇地揭开红布，看看镜子",next:3,effect:()=>{Game.state.heardTheWhisper=true;Game.state.courage++;Game.showStoryLog("镜子里映出的不是你的脸，而是一个模糊的白色人影")}},
                {text:"尊重前人的警告，不去碰它",next:3,effect:()=>{Game.state.memories++;Game.showStoryLog("你隐约觉得，那个红布在微微发光")}},
                {text:"把红布和镜子一起收进抽屉里",next:3,effect:()=>{}},
                {text:"打电话给宿管，问这面镜子是怎么回事",next:3,effect:()=>{Game.state.helpedHer=true;Game.showStoryLog("宿管沉默了很久，说：\"那是上一届留下的，别碰。\"")}},
                {text:"觉得晦气，打开窗户让新鲜空气进来",next:3,effect:()=>{Game.state.wrongAttempts++}}
            ]
        },
        {
            id:3,
            text:"晚饭后你在校园里散步，不知不觉走到了孔目湖。湖面平静得像一面黑色的镜子。一个穿着旧式白衬衫的女生独自坐在湖边的长椅上，手里捧着一本厚厚的书。她抬起头看了你一眼，眼神温柔却带着说不出的悲伤。她轻声问你：\"你是新生吧？你觉得这所学校……漂亮吗？\" 你会——",
            options:[
                {text:"\"很漂亮，特别是这个湖。你也是新生吗？\"",next:4,effect:()=>{Game.state.helpedHer=true;Game.state.metHerBefore=true;Game.showStoryLog("她微微笑了，但眼角有泪光")}},
                {text:"\"还不错。你在看什么书？\"",next:4,effect:()=>{Game.state.courage++;Game.showStoryLog("她把书合上了——封面上写着《1974年华交建校纪事》")}},
                {text:"点点头但没有停下脚步，继续往前走",next:4,effect:()=>{}},
                {text:"\"你是哪个学院的？这么晚了一个人在湖边不安全\"",next:4,effect:()=>{Game.state.memories++;Game.showStoryLog("她轻声说：\"我一直在等一个人\"")}},
                {text:"假装没听到，加快脚步离开",next:4,effect:()=>{Game.state.wrongAttempts++;Game.showStoryLog("走出很远后回头，长椅已经空了")}}
            ]
        },
        {
            id:4,
            text:"开学第三天，你在教8栋（日新楼）上完第一节课。下楼的时候，你在三楼的楼梯拐角处看到了一面老旧的公告栏，上面贴满了泛黄的剪报。其中一张1974年的《江西日报》剪报格外显眼，标题是：\"上海六十五名教师赴赣援建——马鞍山下新大学奠基\"。报道旁边还附了一张黑白合影，照片里的人们站在荒草丛中，背后是一块刚刚立起的石碑。你会——",
            options:[
                {text:"凑近仔细看照片里每一个人的脸",next:5,effect:()=>{Game.state.foundOldPhoto=true;Game.state.memories++;Game.showStoryLog("照片里最后一排，有一个女生的轮廓和湖边那个人一模一样")}},
                {text:"用手机把剪报拍下来保存",next:5,effect:()=>{Game.state.courage++;}},
                {text:"看看就走，没什么特别的",next:5,effect:()=>{}},
                {text:"撕下那张剪报带走",next:5,effect:()=>{Game.state.wrongAttempts++;Game.state.helpedHer=true;Game.showStoryLog("剪报背后用铅笔写着：\"林慧，1974.7.15\"")}},
                {text:"找管理员问问这张剪报的来源",next:5,effect:()=>{Game.state.memories++;Game.showStoryLog("管理员说：\"那个公告栏已经锁了二十多年了，你怎么打开的？\"")}}
            ]
        },
        {
            id:5,
            text:"室友老王是个本地人，他对学校的历史了如指掌。晚上熄灯后，他压低声音告诉你：\"你知道吗，马鞍山上的开山亭，是1974年建校时第一批老师亲手挖出来的地基。但后来出了一件怪事——有个女老师在暴雨天去山洞里抢救资料，再也没出来。有人说她的魂还留在山上，每年新生入学那几天，孔目湖的水会莫名其妙地变浑。\" 你会——",
            options:[
                {text:"\"那后来有人去找过她吗？\"",next:6,effect:()=>{Game.state.helpedHer=true;Game.state.courage++;Game.showStoryLog("老王摇摇头：\"找了三天三夜，只找到一本被泥水浸透的日记\"")}},
                {text:"\"别吓唬人了，这种校园传说每个学校都有\"",next:6,effect:()=>{Game.state.wrongAttempts++;}},
                {text:"\"马鞍山怎么走？我想去看看开山亭\"",next:6,effect:()=>{Game.state.wentToCave=true;Game.state.courage+=2;Game.showStoryLog("老王瞪大了眼睛：\"你疯了吧？现在是晚上！\"")}},
                {text:"默默记在心里，什么也不说",next:6,effect:()=>{}},
                {text:"\"那本日记现在在哪里？\"",next:6,effect:()=>{Game.state.memories++;Game.state.readDiary=true;Game.showStoryLog("老王说：\"听说被收在图书馆的特藏室，但一般人借不到\"")}}
            ]
        },
        {
            id:6,
            text:"深夜十一点二十分，你在图书馆自习到闭馆。从图书馆回北区宿舍有两条路：走天佑桥，宽阔明亮但绕远；走地下通道，近但灯光昏暗，墙壁上满是斑驳的涂鸦。通道入口处贴着一张褪色的告示：\"夜间请结伴通行\"。冷风从通道里呼呼地吹出来，带着一股潮湿的泥土味。你会——",
            options:[
                {text:"走天佑桥，虽然远但安全",next:7,effect:()=>{}},
                {text:"走地下通道，抄近路回去",next:7,effect:()=>{Game.state.heardTheWhisper=true;Game.state.courage++;Game.showStoryLog("通道里回荡着你的脚步声——但你明明穿着软底运动鞋")}},
                {text:"在图书馆门口等一下，看有没有人一起走",next:7,effect:()=>{Game.state.memories++;}},
                {text:"打电话给室友让他来接你",next:7,effect:()=>{Game.state.helpedHer=true;Game.showStoryLog("电话接通了，但对面只有沙沙的杂音")}},
                {text:"不回去了，在图书馆通宵自习",next:8,effect:()=>{Game.state.foundOldPhoto=true;Game.showStoryLog("凌晨三点，你发现书架上有一本没有编号的旧书")}}
            ]
        },
        {
            id:7,
            text:"走在路上，周围的空气突然变得冰冷。你听到身后有人轻轻地叫了一声你的名字——不是全名，而是只有家人才知道的小名。那声音温柔而熟悉，像妈妈在叫你回家吃饭。你猛地回头，路灯下空无一人，只有一只黑色的鸟从天佑桥上掠过。你的手机屏幕自动亮了，显示的时间是 23:23。你会——",
            options:[
                {text:"大声问：\"谁在那里？\"",next:8,effect:()=>{Game.state.courage++;Game.showStoryLog("回答你的只有风吹树叶的沙沙声")}},
                {text:"加快脚步，几乎是用跑的冲回宿舍",next:8,effect:()=>{Game.state.heardTheWhisper=true;}},
                {text:"站在原地，拿出手机打开手电筒照向四周",next:8,effect:()=>{Game.state.courage++;Game.state.memories++;Game.showStoryLog("手电筒的光束在空气中照出了一片漂浮的灰尘——形状像一个站着的人")}},
                {text:"假装什么都没发生，继续慢慢走",next:8,effect:()=>{}},
                {text:"转身往回走，想找出声音的来源",next:9,effect:()=>{Game.state.wrongAttempts++;Game.state.courage+=2;Game.showStoryLog("你发现地上有一串湿漉漉的脚印，一直延伸到湖边")}}
            ]
        },
        {
            id:8,
            text:"第二天早上，你在图书馆三楼靠窗的位置发现了一张夹在书里的老照片。照片已经严重泛黄，但依然能看清：一个穿白衬衫的年轻女生，站在还没完工的天佑桥上，身后是正在建设中的教8栋。她的笑容灿烂而真诚，手里举着一块木牌，上面写着：\"华交，我们来了——1974.5.1\"。照片背面有一行娟秀的钢笔字：\"如果你看到这张照片，请来孔目湖找我。\" 你会——",
            options:[

    diaryContents: [
`1974年3月12日 阴
今天终于到南昌了。
从上海坐了三天三夜的火车，又坐了两个小时的卡车，才到这个叫马鞍山的地方。
到处都是荒草和泥巴，连一条像样的路都没有。
校长说，我们要在这里建一所大学，一所属于中国铁路的大学。
我被分配教数学，住在临时搭的草棚里。
晚上能听到狼叫，有点害怕。
但想到以后会有千千万万的学生在这里读书，就觉得一切都值得。
明天要开始挖地基了，校长说第一座建筑叫"开山亭"。
我喜欢这个名字——开山，就是一切开始的地方。`,

`1974年4月8日 晴
地基挖了快一个月了，手上全是血泡，肩膀肿得抬不起来。
但你知道吗——今天我们六十五个人一起，把第一块基石埋进了土里。
校长在地基里放了一块石碑，上面刻着"创业维艰，郁郁松樟作证"。
他念这段话的时候，好几个老师都哭了。
不是因为苦——是因为骄傲。我们在做一件大事。
我在天佑桥规划的位置旁边种了一棵法桐树苗。
我给它起了个名字：小佑。
希望等它长大的时候，学校已经建好了。`,

`1974年5月1日 晴
今天是劳动节，但我们没有放假——建校就是最好的过节。
开山亭的地基完成了，接下来要开始盖教学楼。
从上海运来的教材终于到了！整整三大箱。
校长说这些教材是学校的命根子，一定要妥善保管。
我把数学教材一本一本编号、登记、用油纸包好。
这些书在上海的时候，是我用了一个暑假编写的。
现在它们终于有了一个家。`,

`1974年6月20日 大雨
南昌的雨季来得又猛又急。
今天下了一整天的大雨，草棚漏水，被子全湿了。
但我们没有停工——因为工期不等人。
有几个老师感冒了，但谁也不肯休息。
晚上的时候，我听到远处有狼叫。
孔目湖的水涨得很高，把岸边的芦苇都淹了。
校长说，等学校建好了，湖边要修一条小路，种满栀子花。
我喜欢栀子花。`,

`1974年7月10日 闷热
天气预报说这几天会有暴雨。
我们把重要的教材和资料整理好，准备转移到安全的地方。
我负责数学教研组的全部资料——三箱手写教案、两箱教材、一箱学生作业范本。
这些是我来南昌的全部意义。
后山有个山洞，很干燥，是个保存资料的好地方。
明天我和几个同事一起把资料搬过去。
希望不要下雨。`,

`1974年7月15日 暴雨
雨下得太大了。
山洪暴发了，孔目湖的水漫上了岸。
我们存的资料随时可能被冲走。
我和四个老师决定立刻把所有资料转移到后山的山洞里。
一趟、两趟、三趟……我们来回跑了七八趟。
资料都安全了。
但最后一趟的时候，山洞入口的土石松动了。
我让其他人先出去。
我留下来把最后一箱资料码整齐。
然后——山洞塌了。
我出不去了。
资料还在我身边。
它们完好无损。
如果有人看到这本日记——
请把资料交给学校。
告诉后来的学生们：
1974年，有一群人从上海来到这里。
在荒山上建起了一所大学。
我们吃了很多苦。
但从来没有后悔过。
因为这所学校——
是我们的骄傲。
日新其德，止于至善。
我爱这所学校。
胜过爱我的生命。`,

    init() {
        this.cacheElements();
        this.bindEvents();
        this.renderQuestion();
    },

    cacheElements() {
        this.elements = {
            startBtn: document.getElementById('startBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            diaryPrev: document.getElementById('diaryPrev'),
            diaryNext: document.getElementById('diaryNext'),
            diaryClose: document.getElementById('diaryClose'),
            confirmBtn: document.getElementById('confirmBtn'),
            restartBtn: document.getElementById('restartBtn'),
            questionContainer: document.getElementById('questionContainer'),
            progressText: document.getElementById('progressText'),
            startModal: document.getElementById('startModal'),
            diaryScreen: document.getElementById('diaryScreen'),
            diaryContent: document.getElementById('diaryContent'),
            finalScreen: document.getElementById('finalScreen'),
            finalText: document.getElementById('finalText'),
            endModal: document.getElementById('endModal'),
            endTitle: document.getElementById('endTitle'),
            endText: document.getElementById('endText'),
            grayOverlay: document.getElementById('grayOverlay'),
            storyLog: document.getElementById('storyLog'),
            terrorScreen: document.getElementById('terrorScreen'),
            terrorText: document.getElementById('terrorText')
        };
    },

    bindEvents() {
        this.elements.startBtn?.addEventListener('click', () => this.startStep());
        this.elements.prevBtn?.addEventListener('click', () => this.goToPrev());
        this.elements.nextBtn?.addEventListener('click', () => this.goToNext());
        this.elements.diaryPrev?.addEventListener('click', () => this.prevDiaryPage());
        this.elements.diaryNext?.addEventListener('click', () => this.nextDiaryPage());
        this.elements.diaryClose?.addEventListener('click', () => this.closeDiary());
        this.elements.confirmBtn?.addEventListener('click', () => this.showEndModal());
        this.elements.restartBtn?.addEventListener('click', () => this.restartQuiz());
    },

    startStep() {
        this.elements.startModal?.classList.remove('active');
        this.renderQuestion();
    },

    renderQuestion() {
        const q = this.questions[this.state.currentQ];
        this.elements.progressText.innerHTML = `
        第${this.state.currentQ+1}题 / 共28题
        <div class="progress-bar" style="width:${(this.state.currentQ+1)/28*100}%"></div>
        `;
        this.elements.questionContainer.innerHTML = `
        <div class="question-container active">
        <div class="question-text">${q.text}</div>
        <ul class="options">
        ${q.options.map((opt,i)=>`<li data-index="${i}">${opt.text}</li>`).join('')}
        </ul>
        </div>
        `;
        this.bindOptionEvents();
        this.elements.prevBtn.disabled = (this.state.currentQ === 0);
        this.elements.nextBtn.disabled = true;
        this.triggerSpecialEffects();
    },

    bindOptionEvents() {
        const options = this.elements.questionContainer.querySelectorAll('.options li');
        options.forEach((el, index) => {
            el.addEventListener('click', () => this.selectOption(index, el));
        });
    },

    triggerSpecialEffects() {
        const q = this.state.currentQ;
        if(q === 6 && this.state.heardTheWhisper) {
            setTimeout(() => this.triggerWhisperEffect(), 1500);
        }
        if(q === 11 && this.state.readDiary) {
            setTimeout(() => this.triggerPhotoEffect(), 1000);
        }
        if(q === 14 && this.state.wentToCave) {
            setTimeout(() => this.triggerCaveEffect(), 800);
        }
        if(q === 16 && this.state.foundTheTruth) {
            setTimeout(() => this.triggerWarmEffect(), 500);
        }
        if(q === 22 && this.state.helpedHer) {
            setTimeout(() => this.triggerSunsetEffect(), 2000);
        }
    },

    triggerWhisperEffect() {
        document.body.classList.add('red-bg');
        setTimeout(() => document.body.classList.remove('red-bg'), 600);
    },

    triggerPhotoEffect() {
        document.body.classList.add('flash');
        setTimeout(() => {
            document.body.classList.remove('flash');
            const sel = this.elements.questionContainer.querySelector('.options li.selected');
            if(sel) this.showMicroFeedback("有人在看着你", sel);
        }, 300);
    },

    triggerCaveEffect() {
        this.state.isLocked = true;
        this.elements.grayOverlay.classList.add('active');
        for(let i = 0; i < 25; i++) {
            setTimeout(() => this.createPeepText("找到她了"), i * 80);
        }
        setTimeout(() => this.elements.grayOverlay.classList.remove('active'), 5000);
    },

    triggerWarmEffect() {
        document.body.style.transition = 'background 2s';
        document.body.style.background = '#fffef5';
        setTimeout(() => {
            document.body.style.background = '#fff';
        }, 3000);
    },

    triggerSunsetEffect() {
        this.showStoryLog("山风吹过松林，发出沙沙的声音");
    },

    selectOption(index, el) {
        if(this.state.isLocked) return;
        const options = this.elements.questionContainer.querySelectorAll('.options li');
        options.forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        this.state.answers[this.state.currentQ] = index;
        const opt = this.questions[this.state.currentQ].options[index];
        opt.effect();
        this.showMicroFeedback("...", el);
        if(Math.random() < 0.15 && this.state.currentQ > 12) {
            const nonSelected = [...options].filter(o => !o.classList.contains('selected'));
            if(nonSelected.length > 0) {
                const rand = nonSelected[Math.floor(Math.random() * nonSelected.length)];
                rand.classList.add('disappear');
            }
        }
        this.elements.nextBtn.disabled = false;
    },

    showMicroFeedback(text, el) {
        const fb = document.createElement('div');
        fb.className = 'micro-feedback';
        fb.textContent = text;
        el.style.position = 'relative';
        el.appendChild(fb);
        setTimeout(() => fb.remove(), 1500);
    },

    showStoryLog(text) {
        const log = this.elements.storyLog;
        log.textContent = text;
        log.style.display = 'block';
        log.style.animation = 'none';
        log.offsetHeight;
        log.style.animation = 'storyFade 3s forwards';
        setTimeout(() => { log.style.display = 'none'; }, 3000);
    },

    createPeepText(text) {
        const el = document.createElement('div');
        el.className = 'peep-text';
        el.textContent = text;
        el.style.left = Math.random() * 85 + 5 + '%';
        el.style.top = Math.random() * 85 + 5 + '%';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    },

    goToPrev() {
        if(this.state.currentQ > 0) {
            this.state.currentQ--;
            this.renderQuestion();
        }
    },

    goToNext() {
        if(this.state.answers[this.state.currentQ] === undefined) return;
        const opt = this.questions[this.state.currentQ].options[this.state.answers[this.state.currentQ]];
        if(opt.next === -1) {
            this.showFinalScreen();
        } else {
            this.state.currentQ = opt.next;
            this.renderQuestion();
        }
    },

    showDiary() {
        this.elements.diaryScreen.classList.add('active');
        this.state.diaryPage = 0;
        this.updateDiary();
    },

    updateDiary() {
        const date = this.diaryDates[this.state.diaryPage];
        const content = this.diaryContents[this.state.diaryPage];
        this.elements.diaryContent.innerHTML = (date ? `<div class="diary-date">${date}</div>` : '') + content;
        this.elements.diaryPrev.disabled = (this.state.diaryPage === 0);
        this.elements.diaryNext.disabled = (this.state.diaryPage === this.diaryContents.length - 1);
    },

    prevDiaryPage() {
        if(this.state.diaryPage > 0) {
            this.state.diaryPage--;
            this.updateDiary();
        }
    },

    nextDiaryPage() {
        if(this.state.diaryPage < this.diaryContents.length - 1) {
            this.state.diaryPage++;
            this.updateDiary();
        }
    },

    closeDiary() {
        this.elements.diaryScreen.classList.remove('active');
        this.state.isLocked = false;
        this.elements.nextBtn.disabled = false;
    },

    showFinalScreen() {
        this.elements.finalText.innerHTML = '';
        this.elements.confirmBtn.className = 'confirm-btn';

        const totalPositive = this.state.memories + this.state.courage;
        const isBad = this.state.wrongAttempts >= 6 || this.state.currentEnding === "bad";
        const isGood = this.state.helpedHer && (this.state.currentEnding === "true" || this.state.currentEnding === "good");
        const isTrue = this.state.foundTheTruth && this.state.memories >= 5;

        if(isBad) {
            const texts = ["你逃出了山洞","但有些东西留在了那里","林慧还在等","等下一个愿意停下脚步的人"];
            texts.forEach((t, i) => {
                const span = document.createElement('div');
                span.className = 'final-text red';
                span.textContent = t;
                span.style.animationDelay = (i * 1.5) + 's';
                this.elements.finalText.appendChild(span);
            });
            this.elements.confirmBtn.style.background = '#c00';
            this.elements.confirmBtn.textContent = '接受';
            this.state.currentEnding = "bad";
        } else if(isGood && isTrue && totalPositive >= 8) {
            const texts = ["林老师终于安息了","她的故事被永远铭记","开山亭的松树又长高了","花椒永远欢迎你"];
            texts.forEach((t, i) => {
                const span = document.createElement('div');
                span.className = 'final-text green';
                span.textContent = t;
                span.style.animationDelay = (i * 1.5) + 's';
                this.elements.finalText.appendChild(span);
            });
            this.elements.confirmBtn.classList.add('green');
            this.elements.confirmBtn.textContent = '传承';
            this.state.currentEnding = "good";
        } else if(isGood && totalPositive >= 4) {
            const texts = ["你完成了林老师的心愿","1974年的故事终于有了结局","但那座山上","还有很多故事没有被发现"];
            texts.forEach((t, i) => {
                const span = document.createElement('div');
                span.className = 'final-text green';
                span.textContent = t;
                span.style.animationDelay = (i * 1.5) + 's';
                this.elements.finalText.appendChild(span);
            });
            this.elements.confirmBtn.classList.add('green');
            this.elements.confirmBtn.textContent = '铭记';
            this.state.currentEnding = "good";
        } else {
            const texts = ["你走出了山洞","但什么都没有改变","林慧还在等","等下一个愿意听她故事的人"];
            texts.forEach((t, i) => {
                const span = document.createElement('div');
                span.className = 'final-text';
                span.textContent = t;
                span.style.animationDelay = (i * 1.5) + 's';
                this.elements.finalText.appendChild(span);
            });
            this.elements.confirmBtn.style.background = '#666';
            this.elements.confirmBtn.textContent = '离开';
            this.state.currentEnding = "hidden";
        }

        this.elements.finalScreen.classList.add('active');
        setTimeout(() => {
            this.elements.confirmBtn.classList.add('show');
        }, 7000);
    },

    showEndModal() {
        this.elements.finalScreen.classList.remove('active');
        this.elements.endModal.classList.add('active');

        if(this.state.currentEnding === "good") {
            const hasTruth = this.state.foundTheTruth;
            this.elements.endTitle.textContent = hasTruth ? "结局一：薪火相传" : "结局二：未完待续";
            this.elements.endText.innerHTML = hasTruth ? `
            1974年，六十五位前辈从上海来到南昌<br>
            在荒山上建起了华东交通大学<br>
            林慧老师是其中之一<br>
            她把生命献给了这所学校<br><br>
            五十年来，她一直守护着这里<br>
            守护着每一个花椒人<br><br>
            你把她留下的资料送到了档案室<br>
            她的名字被刻在了建校先驱纪念墙上<br>
            开山亭旁边，又多了一块碑<br>
            上面写着她的故事<br><br>
            <span style="color:#006633">日新其德，止于至善</span><br>
            这是她留给我们最后的话<br><br>
            ✨ 花椒在等你 ✨
            ` : `
            你完成了林老师的心愿<br>
            但你知道——<br>
            1974年的故事还有很多没有被发现<br><br>
            开山亭还在<br>
            孔目湖还在<br>
            那棵法桐树还在<br><br>
            也许有一天<br>
            会有另一个人<br>
            找到更多关于他们的故事<br><br>
            ✨ 花椒在等你 ✨
            `;
        } else if(this.state.currentEnding === "bad") {
            this.elements.endTitle.textContent = "结局：擦肩而过";
            this.elements.endText.innerHTML = `
            你没能完成她的心愿<br>
            她从你的世界里消失了<br>
            但你知道——<br>
            她还在那座山上<br>
            还在孔目湖边<br>
            还在天佑桥下<br><br>
            等着下一个路过的人<br>
            等着有人停下来<br>
            听她讲1974年的故事<br><br>
            也许那个人会是你<br>
            也许是别人<br>
            但她会一直等下去<br><br>
            ⚠️ 花椒在等你 ⚠️
            `;
        } else {
            this.elements.endTitle.textContent = "结局：路过";
            this.elements.endText.innerHTML = `
            你走出了山洞<br>
            但什么都没有改变<br>
            林老师还在等<br>
            等下一个愿意听她故事的人<br><br>
            也许有一天<br>
            会有人完成她的心愿<br><br>
            🌙 花椒在等你 🌙
            `;
        }
    },

    restartQuiz() {
        this.state = {
            currentQ: 0,
            answers: [],
            isLocked: false,
            diaryPage: 0,
            wrongAttempts: 0,
            currentEnding: "",
            foundOldPhoto: false,
            heardTheWhisper: false,
            wentToCave: false,
            helpedHer: false,
            courage: 0,
            memories: 0,
            readDiary: false,
            foundTheTruth: false,
            metHerBefore: false
        };
        this.elements.endModal.classList.remove('active');
        this.elements.startModal.classList.add('active');
        this.renderQuestion();
    }
};

document.addEventListener('DOMContentLoaded', () => {
    Game.init();
});
</script>
</body>
</html>
