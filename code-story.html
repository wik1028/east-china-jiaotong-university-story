<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>林晚的日记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"STKaiti","KaiTi",sans-serif;
font-size:18px;
background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f0f23 100%);
color:#e0e0e0;
min-height:100vh;
overflow-x:hidden;
transition:all 1s;
}
body.dream-state{
background:linear-gradient(135deg,#2d1f3d 0%,#1a1a2e 50%,#0d0d1a 100%);
filter:hue-rotate(20deg);
}
body.truth-state{
background:linear-gradient(135deg,#1a0a0a 0%,#2e1515 50%,#0a0505 100%);
}
.container{
max-width:600px;
margin:0 auto;
padding:20px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}
.question-container{display:none;animation:fadeIn .5s}
.question-container.active{display:block}
.question-text{
font-size:clamp(1rem,3.5vw,1.15rem);
margin-bottom:20px;
line-height:2;
color:#f5f5f5;
text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
.options{
list-style:none;
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:20px;
}
.options li{
border:2px solid rgba(102,126,234,0.3);
padding:clamp(14px,3vw,18px);
cursor:pointer;
transition:all .3s;
font-size:clamp(0.9rem,3vw,1rem);
background:rgba(255,255,255,0.03);
border-radius:12px;
position:relative;
backdrop-filter:blur(5px);
}
.options li:hover{
border-color:rgba(102,126,234,0.8);
background:rgba(102,126,234,0.15);
transform:translateX(8px);
box-shadow:0 4px 15px rgba(102,126,234,0.2);
}
.options li.selected{
background:rgba(102,126,234,0.3);
border-color:#667eea;
box-shadow:0 0 20px rgba(102,126,234,0.3);
}
.options li.locked{
pointer-events:none;
opacity:0.4;
}
.options li.disappear{
animation:disappear .5s forwards;
}
@keyframes disappear{
to{opacity:0;height:0;padding:0;margin:0;border:0}
}
.btn-nav{
display:flex;
gap:10px;
margin-top:10px;
}
.btn-nav button{
flex:1;
padding:clamp(14px,3vw,18px);
border:2px solid rgba(102,126,234,0.4);
background:rgba(102,126,234,0.1);
color:#a0a0c0;
cursor:pointer;
font-size:clamp(0.9rem,3vw,1rem);
transition:all .3s;
border-radius:12px;
}
.btn-nav button:hover:not(:disabled){
background:rgba(102,126,234,0.2);
border-color:#667eea;
color:#fff;
}
.btn-nav button:disabled{
opacity:0.2;
cursor:not-allowed;
}
.progress{
text-align:center;
font-size:clamp(0.8rem,2.5vw,0.9rem);
color:#888;
margin-bottom:15px;
height:20px;
position:relative;
text-shadow:0 1px 2px rgba(0,0,0,0.5);
}
.progress-bar{
position:absolute;
bottom:0;
left:0;
height:3px;
background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);
transition:width .5s;
border-radius:2px;
box-shadow:0 0 10px rgba(102,126,234,0.5);
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
z-index:1000;
align-items:center;
justify-content:center;
padding:20px;
}
.modal-overlay.active{display:flex}
.modal{
background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
padding:clamp(25px,5vw,40px);
max-width:480px;
width:100%;
text-align:center;
border:1px solid rgba(102,126,234,0.3);
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-title{
font-size:clamp(1.2rem,4vw,1.5rem);
margin-bottom:20px;
color:#667eea;
font-weight:bold;
text-shadow:0 0 20px rgba(102,126,234,0.5);
}
.modal-text{
font-size:clamp(0.95rem,3vw,1.05rem);
color:#b0b0c0;
line-height:1.9;
margin-bottom:25px;
}
.modal-btn{
padding:14px 35px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:#fff;
border:none;
cursor:pointer;
font-size:clamp(0.95rem,3vw,1rem);
border-radius:25px;
transition:all .3s;
box-shadow:0 5px 20px rgba(102,126,234,0.4);
}
.modal-btn:hover{
transform:scale(1.05);
box-shadow:0 8px 30px rgba(102,126,234,0.6);
}
.warning-modal{
border:2px solid #ff4757;
animation:pulse 1.5s infinite alternate;
}
.warning-modal .modal-title{color:#ff4757}
@keyframes pulse{
from{transform:scale(1);box-shadow:0 0 0 rgba(255,71,87,0)}
to{transform:scale(1.01);box-shadow:0 0 30px rgba(255,71,87,0.3)}
}
.black-screen{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:2000;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
}
.black-screen.active{display:flex}
.terror-text{
color:#ff4757;
font-size:clamp(1.3rem,4vw,1.8rem);
text-align:center;
animation:textGlitch 0.15s infinite;
text-shadow:0 0 20px #ff4757;
}
@keyframes textGlitch{
0%{opacity:1;transform:translate(0)}
25%{opacity:0.8;transform:translate(-2px,1px)}
50%{opacity:1;transform:translate(2px,-1px)}
75%{opacity:0.9;transform:translate(-1px,-2px)}
100%{opacity:1;transform:translate(0)}
}
.peep-text{
position:fixed;
font-size:clamp(1rem,3vw,1.3rem);
color:#ff4757;
pointer-events:none;
z-index:800;
opacity:0;
font-weight:bold;
text-shadow:0 0 15px #ff4757;
animation:peepFade 5s forwards;
}
@keyframes peepFade{
0%{opacity:0}
15%{opacity:1}
85%{opacity:1}
100%{opacity:0}
}
.gray-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
z-index:600;
display:none;
}
.gray-overlay.active{display:block}
.micro-feedback{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
padding:5px 12px;
font-size:0.85rem;
white-space:nowrap;
animation:fadeOut 1.5s forwards;
z-index:100;
border-radius:12px;
box-shadow:0 3px 10px rgba(102,126,234,0.5);
}
@keyframes fadeOut{
0%{opacity:1;transform:translateX(-50%) translateY(0)}
70%{opacity:1;transform:translateX(-50%) translateY(-5px)}
100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
.diary-screen{
position:fixed;
inset:0;
background:#050508;
z-index:3000;
display:none;
padding:20px;
}
.diary-screen.active{display:block}
.diary-container{
max-width:520px;
margin:15px auto;
height:calc(100vh - 100px);
max-height:620px;
position:relative;
}
.diary-page{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#0a0a14 0%,#12121f 50%,#0a0a14 100%);
padding:clamp(18px,4vw,25px);
overflow-y:auto;
font-family:"STKaiti","KaiTi",serif;
line-height:2.2;
box-shadow:0 10px 40px rgba(0,0,0,0.8),inset 0 0 50px rgba(102,126,234,0.05);
border-radius:15px;
border:1px solid rgba(102,126,234,0.2);
}
.diary-page::-webkit-scrollbar{width:6px}
.diary-page::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:3px}
.diary-page::-webkit-scrollbar-thumb{background:rgba(102,126,234,0.5);border-radius:3px}
.diary-date{
text-align:center;
color:#667eea;
font-size:0.9rem;
margin-bottom:20px;
font-family:sans-serif;
font-weight:bold;
padding-bottom:10px;
border-bottom:1px solid rgba(102,126,234,0.2);
}
.diary-content{
font-size:clamp(0.95rem,3vw,1.05rem);
white-space:pre-wrap;
word-break:break-all;
color:#d0d0e0;
}
.diary-nav{
display:flex;
justify-content:space-between;
margin-top:15px;
}
.diary-nav button{
padding:10px 22px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:#fff;
border:none;
cursor:pointer;
border-radius:20px;
font-size:0.9rem;
transition:all .3s;
}
.diary-nav button:hover:not(:disabled){
transform:scale(1.05);
box-shadow:0 5px 15px rgba(102,126,234,0.4);
}
.diary-nav button:disabled{background:#333;cursor:not-allowed}
.final-screen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f0f23 0%,#1a1a2e 100%);
z-index:4000;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}
.final-screen.active{display:flex}
.final-text{
color:#fff;
font-size:clamp(1.3rem,4.5vw,1.8rem);
margin:12px 0;
opacity:0;
animation:fadeInText 1.2s forwards;
text-shadow:0 0 30px currentColor;
}
.final-text.red{color:#ff4757;}
.final-text.green{color:#2ed573;}
.final-text.gold{color:#ffd700;}
.final-text.purple{color:#a855f7;}
@keyframes fadeInText{
to{opacity:1}
}
.confirm-btn{
margin-top:35px;
padding:16px 45px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:#fff;
border:none;
cursor:pointer;
font-size:1.1rem;
display:none;
border-radius:28px;
transition:all .3s;
box-shadow:0 8px 30px rgba(102,126,234,0.5);
}
.confirm-btn.show{display:block}
.confirm-btn:hover{transform:scale(1.05)}
.flash{animation:flash .15s 4;}
@keyframes flash{
50%{background:#fff;filter:brightness(2)}
}
.sound-hint{
font-size:0.7rem;
color:#555;
text-align:center;
margin-top:12px;
}
.story-log{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.95);
color:#667eea;
padding:12px 25px;
font-size:0.95rem;
z-index:500;
display:none;
animation:storyFade 3.5s forwards;
border:1px solid rgba(102,126,234,0.5);
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}
@keyframes storyFade{
0%{opacity:0;transform:translateX(-50%) translateY(15px)}
15%{opacity:1;transform:translateX(-50%) translateY(0)}
85%{opacity:1;transform:translateX(-50%) translateY(0)}
100%{opacity:0;transform:translateX(-50%) translateY(-15px)}
}
.truth-reveal{
background:linear-gradient(135deg,#ff6b6b 0%,#ee5a6f 100%);
padding:22px;
border-radius:15px;
margin:15px 0;
text-align:left;
box-shadow:0 5px 30px rgba(255,71,87,0.3);
}
.truth-reveal .title{
color:#fff;
font-weight:bold;
font-size:1.15rem;
margin-bottom:12px;
}
.truth-reveal .content{
color:rgba(255,255,255,0.95);
line-height:1.9;
}
.photo-frame{
width:150px;
height:150px;
margin:15px auto;
border:3px solid #667eea;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(102,126,234,0.3);
}
.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
}
.dream-text{
color:#9d8ec7;
font-style:italic;
}
.heartbeat{
animation:heartbeat 1s infinite;
}
@keyframes heartbeat{
0%,100%{transform:scale(1)}
50%{transform:scale(1.1)}
}
</style>
</head>
<body>
<div class="container" id="app">
<div class="progress" id="progressText">
第1题 / 共28题
<div class="progress-bar" id="progressBar" style="width:3.5%"></div>
</div>
<div id="questionContainer"></div>
<div class="btn-nav" id="btnNav">
<button id="prevBtn" disabled>← 上一题</button>
<button id="nextBtn" disabled>下一题 →</button>
</div>
</div>
<div class="modal-overlay active" id="startModal">
<div class="modal warning-modal">
<div class="modal-title">⚠️ 警告</div>
<div class="modal-text">
欢迎来到青河医科大学<br><br>
你是林夏，大一新生<br>
从小到大，你一直是家里的独女<br>
父母恩爱，家庭和睦<br>
至少……你是这样认为的<br><br>
<span class="dream-text">但最近，总有一些奇怪的画面在脑海中闪过</span><br>
<span style="color:#ff4757">有些记忆，也许最好不要想起</span>
</div>
<button class="modal-btn" id="startBtn">开始探索</button>
</div>
</div>
<div class="black-screen" id="terrorScreen">
<div class="terror-text" id="terrorText"></div>
</div>
<div class="gray-overlay" id="grayOverlay"></div>
<div class="diary-screen" id="diaryScreen">
<div class="diary-container">
<div class="diary-page" id="diaryPage">
<div class="diary-content" id="diaryContent"></div>
</div>
</div>
<div class="diary-nav">
<button id="diaryPrev">← 上一页</button>
<button id="diaryNext">下一页 →</button>
<button id="diaryClose">合上日记</button>
</div>
</div>
<div class="final-screen" id="finalScreen">
<div id="finalText"></div>
<button class="confirm-btn" id="confirmBtn">继续</button>
</div>
<div class="modal-overlay" id="endModal">
<div class="modal">
<div class="modal-title" id="endTitle"></div>
<div class="modal-text" id="endText"></div>
<button class="modal-btn" id="restartBtn">重新开始</button>
</div>
</div>
<div class="story-log" id="storyLog"></div>

<script>
const Game = {
    state: {
        currentQ: 0,
        answers: [],
        isLocked: false,
        diaryPage: 0,
        trust: 0,
        courage: 0,
        curiosity: 0,
        foundDiary: false,
        readAllDiary: false,
        knowsTruth: false,
        metGhost: false,
        hasPhoto: false,
        sawDream: false,
        metTwin: false,
        discoveredIdentity: false
    },

    questions: [
        {
            id:1,
            text:"九月的阳光洒在青河医科大学的校门上。你拖着行李箱走进校园，迎新处的学长学姐们热情地招呼着新生。忽然，你的目光被什么吸引住了——校门口的宣传栏上贴着一张十年前的照片，照片已经褪色，但依稀能看出是两个穿着校服的女孩，她们一模一样，笑得很灿烂。照片下面有一行小字：\"2005级护理系林晚、林夏——永远的姐妹\"。你的心突然跳得很快。你会——",
            options:[
                {text:"走近仔细看那张照片，想看清楚那两个女孩的脸",next:2,effect:()=>{Game.state.curiosity+=2;Game.state.sawDream=true;Game.showStoryLog("照片里的两个人……怎么看起来这么像我？")}},
                {text:"觉得奇怪，继续去办理入学手续",next:2,effect:()=>{Game.state.curiosity++}},
                {text:"问旁边的学长：\"这照片上的人是谁？\"",next:2,effect:()=>{Game.state.courage++;Game.showStoryLog("学长挠挠头：\"不知道，听说是十年前的……听说出了什么事。\"")}},
                {text:"拍下照片，回去问父母",next:2,effect:()=>{Game.state.hasPhoto=true;Game.state.curiosity+=2}},
                {text:"心里突然涌起一阵莫名的恐惧，加快脚步离开",next:2,effect:()=>{Game.state.heardWhispers=true;Game.showStoryLog("那一瞬间，你的太阳穴突然刺痛")}}
            ]
        },
        {
            id:2,
            text:"入学第一周，你在宿舍整理行李时，从箱子最底层翻出一张老照片。这张照片和校门口那张不同——这是一张全家福，照片里是年轻时的父母，他们中间站着两个一模一样的小女孩。但奇怪的是，你完全不记得这张照片是什么时候拍的，更不记得照片里那两个女孩是谁。你翻到照片背面，上面用钢笔写着一行字：\"晚夏双生，2005\"。你会——",
            options:[
                {text:"仔细端详照片中那两个女孩的长相",next:3,effect:()=>{Game.state.curiosity+=2;Game.state.hasPhoto=true;Game.showStoryLog("你的心跳加速了——照片里的两个孩子，一个像你，一个……也像你")}},
                {text:"把照片收好，假装什么都没发生",next:3,effect:()=>{Game.state.trust++}},
                {text:"打电话给妈妈：\"妈，我箱子里这张照片是谁？\"",next:3,effect:()=>{Game.state.courage++;Game.showStoryLog("妈妈沉默了几秒：\"什么照片？……哦，那个啊，是亲戚家的孩子，拿错箱子了。\"")}},
                {text:"觉得这件事太奇怪了，晚上做梦都在想这件事",next:3,effect:()=>{Game.state.sawDream=true;Game.showStoryLog("那天晚上，你梦见了两个女孩在海边奔跑")}},
                {text:"在网上搜索\"青河医科大学 林晚\"",next:3,effect:()=>{Game.state.curiosity+=2;Game.showStoryLog("搜索结果：\"林晚，青河医科大学2005级护理系学生，2015年意外身亡……\"")}}
            ]
        },
        {
            id:3,
            text:"几天后的深夜，你躺在宿舍床上怎么也睡不着。室友们的呼吸声很均匀，但你却辗转反侧。脑海中不断闪过那些画面——两个一模一样的女孩、那张写着\"林晚、林夏\"的照片、还有妈妈电话里奇怪的停顿。突然，你听到了走廊里传来轻轻的脚步声——那脚步声在你门口停住了。你会——",
            options:[
                {text:"悄悄起身，透过门缝往外看",next:4,effect:()=>{Game.state.courage+=2;Game.showStoryLog("门外站着一个白色的身影，长发遮住了脸……但她的轮廓，看起来很熟悉")}},
                {text:"屏住呼吸，假装睡着了",next:4,effect:()=>{Game.state.trust--}},
                {text:"小声问：\"谁在那里？\"",next:4,effect:()=>{Game.state.courage++;Game.showStoryLog("门外没有回答，但脚步声轻轻远去了……你听到走廊尽头传来一声叹息")}},
                {text:"打开手机手电筒，冲出去查看",next:4,effect:()=>{Game.state.courage+=3;Game.state.heardWhispers=true;Game.showStoryLog("走廊尽头空无一人，但地上有一串湿漉漉的脚印——脚印的形状，和你的脚一模一样")}},
                {text:"用被子蒙住头，心跳如雷",next:4,effect:()=>{Game.showStoryLog("那一夜，你梦见了火光，梦见了一个女孩在哭着叫你的名字")}}
            ]
        },
        {
            id:4,
            text:"第二天早上，你在图书馆自习时，偶然翻到一本十年前的校刊。校刊的封面是一个叫\"晚夏文学社\"的社团招新广告，上面写着：\"双生姐妹，情深似海——林晚、林夏邀你加入\"。你的手开始发抖——林夏，那是你的名字。你继续往后翻，在一篇社团活动的报道里，你看到了一句话：\"林晚与林夏是双胞胎姐妹，感情深厚，形影不离\"。你会——",
            options:[
                {text:"继续翻找这本校刊，寻找更多信息",next:5,effect:()=>{Game.state.curiosity+=2;Game.showStoryLog("在校刊的最后一页，你看到了一则讣告：\"林夏同学因意外于2015年6月15日去世……\"")}},
                {text:"合上校刊，心跳加速，想冷静一下",next:5,effect:()=>{Game.state.trust++}},
                {text:"去学校档案室查找十年前的记录",next:5,effect:()=>{Game.state.courage++;Game.state.curiosity++}},
                {text:"打电话给家里，质问他们关于\"双胞胎\"的事",next:5,effect:()=>{Game.state.courage+=2;Game.showStoryLog("父亲的声音听起来很疲惫：\"小夏，有些事……等你毕业了再说，好吗？\"")}},
                {text:"拍下校刊的内容，去找那个戴眼镜的学长问问",next:5,effect:()=>{Game.state.curiosity++;Game.showStoryLog("学长看了照片后脸色变了：\"你怎么会有这个？……晚夏文学社，十年前就被强制解散了。\"")}}
            ]

        {
            id:16,
            text:"你和妈妈聊了很久。她说了很多——关于那场火，关于爸爸，关于她这些年是怎么活下来的。她没有求你原谅，因为她知道有些罪孽是无法被原谅的。最后，她拿出一个盒子递给你：\"这是你姐姐留下的。她说……如果你有一天回来，就把盒子交给你。\" 你接过盒子，打开一看——里面是一个U盘和一封信。信上写着：\"给活着的那个——无论你是林晚还是林夏。\" 你攥紧了盒子。你会——",

        {
            id:17,
            text:"你找到了爸爸。他住在城市另一端的一间小公寓里，过着简单而孤独的生活。十年了，他没有再婚，没有离开这座城市——他说，他要等两个女儿回来。当他看到你时，他愣住了。\"小夏？\"然后他的眼眶红了：\"不……你是小晚。我的大女儿……\" 你走进他的公寓，看到墙上挂着一张全家福——那是你六岁时的照片。照片里，两个一模一样的女孩站在父母中间，笑得那么灿烂。\"爸爸……\"你的声音哽咽了。你会——",

                {text:"\"爸爸，告诉我全部真相。我准备好了。\"",next:18,effect:()=>{Game.state.courage+=2;Game.state.knowsTruth=true;Game.showStoryLog("爸爸深吸一口气，开始讲述：\"十年前，我发现你妈妈……她有精神病。她一直把你们当成'替代品'……因为她自己没能生下双胞胎……\"")}},
                {text:"\"爸爸，小夏……她是怎么死的？\"",next:18,effect:()=>{Game.state.curiosity+=2;Game.showStoryLog("爸爸的眼眶湿润了：\"她把你推出窗户，自己却……被火吞噬了。她才十五岁……\"")}},
                {text:"\"爸爸，你为什么离开妈妈？\"",next:18,effect:()=>{Game.state.curiosity++;Game.showStoryLog("爸爸苦笑：\"因为我不知道该怎么面对她。我恨她，但我……也爱她。这就是最残忍的地方。\"")}},
                {text:"\"爸爸，我想把你们的房子买下来，建一个小纪念馆。\"",next:18,effect:()=>{Game.state.courage+=2;Game.showStoryLog("爸爸点头：\"好……那栋房子本来就该留给你们。是爸爸没用，没能保护好你们。\"")}}

        {
            id:18,
            text:"你离开爸爸家时，天已经黑了。\"你\"出现在你身边，轻声说：\"现在，你已经知道了全部真相。你可以做出选择了。\"你回头看着那栋昏暗的公寓楼，心中百感交集。\"什么选择？\"你问。\"你\"回答：\"你可以继续以'林夏'的身份活下去，也可以改回'林晚'的身份。你可以恨妈妈，也可以原谅她。你可以记住这一切，也可以选择忘记。\" 你的选择是什么？",

                {text:"\"我要继续做林夏。那是小夏留给我的名字。\"",next:19,effect:()=>{Game.state.courage++;Game.showStoryLog("她点头：\"我理解。这是妹妹的愿望。\"")}},
                {text:"\"我要去看妈妈。不是为了原谅，是为了……告别。\"",next:19,effect:()=>{Game.state.courage+=2;Game.showStoryLog("你回到那栋老房子，和妈妈做了一次长谈——关于过去，关于未来，关于原谅")}},
                {text:"\"我要把这一切写下来。让更多人知道小夏的故事。\"",next:19,effect:()=>{Game.state.curiosity+=2;Game.showStoryLog("你写下了《晚夏日记》——这本书后来感动了无数人")}},

            text:"你终于做出了决定。你决定把这一切——所有的真相，所有的痛苦，所有的记忆——都写进一本书里。你给书写了一个名字：《晚夏日记》。\"你\"看完书稿后，轻声说：\"这本书……是小夏最想看到的。\" 你看着窗外，夜空中似乎有星星在闪烁。你会——",

`2005年9月1日 晴

今天是我和小夏来到青河医科大学的第一天。

我是林晚，大一的护理系学生。
我的双胞胎妹妹林夏，和我读同一个专业。

我们从小到大都在同一个班级，同一所学校。
现在，又是同一所大学，同一个宿舍。

妈妈说我们是"晚夏双生"，所以给我们取了这个名字。
晚是晚霞的晚，夏是夏天的夏。
妈妈说，她希望我们像晚霞和夏天一样，永远灿烂。

但最近我总是做一些奇怪的梦。
梦里有火光，有尖叫，还有一个我看不清脸的人在哭。
我不知道这些梦是什么意思。
但每次醒来，小夏都睡得很香。
我不想告诉她。
我不想让她担心。

——林晚`,

`2008年3月15日 阴

今天是小夏的生日。

我偷偷给她准备了一个惊喜——一条项链，上面刻着我们的名字。
她收到礼物时高兴得跳了起来，抱着我转了好几圈。

"姐姐，我们会永远在一起吗？"她问我。

我说："当然会。我们是双胞胎，一辈子都不会分开。"

但我没有告诉她的是——最近我的梦越来越频繁了。
每次梦醒，我都会觉得心口很痛。
就好像……有什么重要的事情要发生一样。

小夏总说我太敏感了。
也许她是对的。
我应该放松一点。

毕竟，我们是那么幸福的一家人。
爸爸虽然工作忙，但很疼我们。
妈妈虽然有时候情绪不稳定，但她很爱我们。
小夏虽然有时候很任性，但她是我最好的朋友。

这样的生活，我愿意过一辈子。

——林晚`,

`2010年6月20日 小雨

今天发生了一件很奇怪的事。

我在整理旧物时，发现了一张照片。
照片上是三个婴儿，躺在一张床上。
但我记得，我们家只有我和妹妹两个孩子啊。

我拿着照片去问妈妈。
妈妈的表情突然变得很奇怪。
她说："这是你们小时候的照片。那时候你总是生病，所以我们又生了一个孩子……"
"什么？"我愣住了。
"没什么。"妈妈突然变得很冷淡，"那是很久以前的事了。你不要多想。"

但我怎么可能不多想？
三个婴儿？
多出来的那个是谁？
为什么妈妈的反应那么奇怪？

晚上睡觉时，我问小夏："你还记得小时候的事吗？"
她说："记得啊。我们从小一起长大，感情可好了。"
"除了我们，家里还有别的孩子吗？"
小夏想了想："好像……没有了？姐姐，你怎么突然问这个？"

我没有再问。
但我知道，一定有什么事情被隐瞒了。

——林晚`,

`2013年9月10日 晴

今天是我的生日。

但没有人记得。
爸爸出差了，妈妈一大早就出门了，说是要去看"一个朋友"。
小夏……小夏忘记了我的生日。

我一个人坐在房间里，看着那张三个婴儿的照片。
照片被我从妈妈那里偷出来了。
最近我一直在研究这张照片，想找出那个"第三个婴儿"的线索。

我注意到照片的背面有一行小字：
"2003年8月15日，三个宝贝，妈妈永远爱你们。"

三个宝贝。
不是两个，是三个。

我开始在网上搜索十年前的新闻。
我找到了一条关于"三胞胎婴儿"的消息：
"……据悉，这三个婴儿在出生后不久，其中一个因病被送回老家抚养……"

被送走了？
送回老家？
她现在在哪里？

我有一种强烈的预感——
那个"第三个婴儿"，和我、小夏之间，一定有某种联系。

——林晚`,

`2014年11月5日 阴

我找到了答案。

那个"第三个婴儿"……死了。
据说是出生后三个月，因为先天性心脏病去世的。
她被埋在老家的一座山上，连墓碑都没有。

妈妈从来没有提起过这件事。
爸爸也是。
小夏……可能根本不知道有这个人存在。

但有一件事让我很困惑——
为什么我的梦里，总是有一个模糊的身影？
为什么每次梦到那个身影，我都会哭？

也许……那不是梦。
也许是某种"感应"。

如果那个孩子真的存在过……
如果她真的死去了……
那她会不会……一直在看着我们？

我想去那座山看看。
我想去她的墓前，给她上一炷香。

但我不知道该怎么跟妈妈说。
也许……这件事，还是不要告诉她比较好。

——林晚`,

`2015年6月14日 夜

明天就是小夏的生日了。

我给她准备了一个特别的礼物——一本日记，记录了我们从小到大的点点滴滴。
我想告诉她：不管发生什么，我们永远是姐妹。

但我有一种不祥的预感。
最近妈妈越来越奇怪了。
她总是半夜出门，有时候还会自言自语。
爸爸说她压力太大，需要休息。
但我觉得……不止是这样。

今天晚上，我听到妈妈在房间里哭。
她说："对不起……对不起……我不是故意的……"

我不知道她在说什么。
但我很害怕。

小夏已经睡着了。
我坐在书桌前，写下这段话。
如果明天……如果明天发生了什么可怕的事……
我希望看到这本日记的人，能告诉小夏——

姐姐爱她。
永远。

——林晚 绝笔`,

`2015年6月15日 凌晨

火。

到处都是火。

妈妈锁上了门，在房间里浇了什么东西。
我知道那是什么味道——是汽油。

"妈妈！"我尖叫，"妈妈你在干什么！"

她没有回答。
她只是站在那里，看着火焰一点点蔓延。
她的眼神……我从来没见过那种眼神。
那不是妈妈的眼神。
那是……魔鬼的眼神。

"妈妈……为什么……"小夏在我身后哭泣。

我想带小夏逃跑，但门被锁死了。
窗户也被封住了。
我们被困住了。

火焰越来越近。
我听到小夏在尖叫。
我想保护她，但我什么都做不了。

就在这时——

我做了一个决定。

我把小夏推向窗户，用尽全力踹碎了玻璃。
然后，我把她推出窗外。

"姐姐！！"她尖叫着。

"活下去！"我喊，"小夏，活下去！"

然后，火焰吞噬了我。

在最后一刻，我看到了一个身影——
是那个"第三个婴儿"。
她站在火光中，对我微笑。

"欢迎回来。"她说。

然后，一切都是空白。

——林晚
（此页大部分被烧毁，以下为抢救出的残片）

……不要恨任何人……
……活下去……
……姐姐永远爱你……
……林晚……

（最后一行字迹模糊不清）
